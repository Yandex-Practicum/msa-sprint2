spring:
  datasource:
    url:  ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hotelio}
    username: ${SPRING_DATASOURCE_USERNAME:hotelio}
    password: ${SPRING_DATASOURCE_PASSWORD:hotelio}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate.format_sql: false

booking:
  service:
    external-host: ${BOOKING_SERVICE_EXTERNAL_HOST:localhost}
    external-port: ${BOOKING_SERVICE_EXTERNAL_PORT:9090}
