version: '3.8'

services:
  apollo-gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    networks:
      - hotelio-net
    depends_on:
      - booking-subgraph
      - hotel-subgraph

  booking-subgraph:
    build: ./booking-subgraph
    networks:
      - hotelio-net
    ports:
      - "4001:4001"

  hotel-subgraph:
    build: ./hotel-subgraph
    networks:
      - hotelio-net
    ports:
      - "4002:4002"

networks:
  hotelio-net:
    external: true
