services:
  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    depends_on:
      - booking-subgraph
      - hotel-subgraph
      - promocode-subgraph

  booking-subgraph:
    build: ./booking-subgraph
    ports:
      - "4001:4001"
    environment:
      BOOKING_SERVICE_URL: http://host.docker.internal:8084
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hotel-subgraph:
    build: ./hotel-subgraph
    ports:
      - "4002:4002"

  promocode-subgraph:
    build: ./promocode-subgraph
    ports:
      - "4003:4003"