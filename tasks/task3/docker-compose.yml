services:
  apollo-gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    depends_on:
      - booking-subgraph
      - hotel-subgraph
    networks:
      - hotelio-net

  booking-subgraph:
    container_name: booking-subgraph
    build: ./booking-subgraph
    ports:
      - "4001:4001"
    environment:
      BOOKING_SERVICE_HOST: booking-service
      BOOKING_SERVICE_PORT: 9090
      HOTEL_SUBGRAPH_HOST: hotel-subgraph
      HOTEL_SUBGRAPH_PORT: 4002
    networks:
      - hotelio-net
    volumes:
      - ./booking-subgraph:/app
    depends_on:
      - booking-service

  booking-service:
    build:
      context: ./booking
      dockerfile: Dockerfile
    container_name: booking-service
    ports:
      - "9090:9090"
    environment:
      DB_HOST: booking-db
      DB_PORT: 5433
      DB_USER: booking
      DB_PASS: booking
      DB_NAME: booking
      G_RPC_PORT: 9090
    volumes:
      - ./booking/data:/app/data
    networks:
      - hotelio-net
    depends_on:
      - booking-db

  booking-db:
    image: postgres:15
    container_name: booking-db
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking
    ports:
      - "5432:5432"
    volumes:
      - booking-database:/var/lib/postgresql/data
    networks:
      - hotelio-net

  hotel-subgraph:
    container_name: hotel-subgraph
    build: ./hotel-subgraph
    ports:
      - "4002:4002"
    environment:
      BOOKING_SERVICE_HOST: hotel-service
      BOOKING_SERVICE_PORT: 9091
    networks:
      - hotelio-net
    depends_on:
      - hotel-service

  hotel-service:
    build:
      context: ./hotel
      dockerfile: Dockerfile
    container_name: hotel-service
    ports:
      - "9091:9090"
    environment:
      DB_HOST: hotel-db
      DB_PORT: 5433
      DB_USER: hotel
      DB_PASS: hotel
      DB_NAME: hotel
      G_RPC_PORT: 9091
    volumes:
      - ./hotel/data:/app/data
    networks:
      - hotelio-net
    depends_on:
      - hotel-db

  hotel-db:
    image: postgres:15
    container_name: hotel-db
    environment:
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel
      POSTGRES_DB: hotel
    ports:
      - "5433:5432"
    volumes:
      - hotel-database:/var/lib/postgresql/data
    networks:
      - hotelio-net

volumes:
  booking-database:
  hotel-database:

networks:
  hotelio-net:
    external: true
