version: '3.8'

services:
  apollo-gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    depends_on:
      - booking-subgraph
      - hotel-subgraph
    networks:
      - hotelio-net

  booking-subgraph:
    build: ./booking-subgraph
    ports:
      - "4001:4001"
    networks:
      - hotelio-net
    environment:
      BOOKING_SERVICE: booking-service:9090

  hotel-subgraph:
    build: ./hotel-subgraph
    ports:
      - "4002:4002"
    networks:
      - hotelio-net
    environment:
      HOTEL_SERVICE: monolith:8080
networks:
  hotelio-net:
    external: true
