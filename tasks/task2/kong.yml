_format_version: "2.1"
_transform: true

services:
  - name: monolith-service
    url: http://monolith:8080
    routes:
      - name: monolith-bookings-get
        paths:
          - /api/bookings
        methods:
          - GET
        strip_path: false
      
      - name: monolith-other-apis
        paths:
          - /api/users
          - /api/hotels
          - /api/promocodes
          - /api/reviews
        strip_path: false

  - name: booking-service
    url: http://booking-service:8080
    routes:
      - name: booking-create-route
        paths:
          - /api/bookings
        methods:
          - POST
        strip_path: false

  - name: history-service
    url: http://booking-history-service:8081
    routes:
      - name: history-statistics
        paths:
          - /api/statistics
        strip_path: false

plugins:
  - name: http-log
    service: monolith-service
    config:
      http_endpoint: http://kong:8001/logs
      method: POST
      timeout: 1000
      keepalive: 60000

  - name: rate-limiting
    service: booking-service
    config:
      minute: 100
      hour: 1000
      policy: local

  - name: cors
    service: monolith-service
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
      exposed_headers:
        - X-Total-Count
      credentials: true
      max_age: 3600
