version: "3.8"

services:
  booking-db:
    image: postgres:15
    container_name: booking-db
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking_db
    ports:
      - "5433:5432"
    volumes:
      - booking-db-data:/var/lib/postgresql/data
    networks:
      - hotelio-net

  booking-history-db:
    image: postgres:15
    container_name: booking-history-db
    environment:
      POSTGRES_USER: history
      POSTGRES_PASSWORD: history
      POSTGRES_DB: history_db
    ports:
      - "5434:5432"
    volumes:
      - history-db-data:/var/lib/postgresql/data
    networks:
      - hotelio-net

  booking-service:
    build:
      context: ../../microservices/booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    ports:
      - "9090:9090"
    networks:
      - hotelio-net
    environment:
      DB_HOST: booking-db
      DB_PORT: 5432
      DB_USER: booking
      DB_PASSWORD: booking
      DB_NAME: booking_db
      KAFKA_BROKER: kafka:9092
      USER_SERVICE_URL: http://monolith:8080
      HOTEL_SERVICE_URL: http://monolith:8080
      PROMO_SERVICE_URL: http://monolith:8080
      REVIEW_SERVICE_URL: http://monolith:8080
    depends_on:
      - booking-db

  booking-history-service:
    build:
      context: ../../microservices/booking-history-service
      dockerfile: Dockerfile
    container_name: booking-history-service
    networks:
      - hotelio-net
    environment:
      DB_HOST: booking-history-db
      DB_PORT: 5432
      DB_USER: history
      DB_PASSWORD: history
      DB_NAME: history_db
      KAFKA_BROKER: kafka:9092
    depends_on:
      - booking-history-db

volumes:
  booking-db-data:
  history-db-data:

networks:
  hotelio-net:
    external: true