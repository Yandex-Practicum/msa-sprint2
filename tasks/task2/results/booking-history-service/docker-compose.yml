services:
  booking_history_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking_history_service
    depends_on:
      - booking_history_service_db
    ports:
      - "9091:8000"
    networks:
      - hotelio-net
    environment:
      KAFKA_BOOTSTRAP_SERVER_HOST: host.docker.internal
      KAFKA_BOOTSTRAP_SERVER_PORT: 9092
      KAFKA_NEW_BOOKING_TOPIC_NAME: BookingCreated
      POSTGRES_HOST: host.docker.internal
      POSTGRES_USER: hotelio_booking_history_service_user
      POSTGRES_PASSWORD: hotelio_booking_history_service_password
      POSTGRES_DB: hotelio_booking_history_db
      POSTGRES_PORT: 7432

  booking_history_service_db:
    image: postgres:15
    container_name: booking_history_service_db
    environment:
      POSTGRES_USER: hotelio_booking_history_service_user
      POSTGRES_PASSWORD: hotelio_booking_history_service_password
      POSTGRES_DB: hotelio_booking_history_db
    ports:
      - "7432:5432"
    volumes:
      - booking_history-db-data:/var/lib/postgresql/data
    networks:
      - hotelio-net

volumes:
  booking_history-db-data:

networks:
  hotelio-net:
    external: true