version: "3.8"

services:
  monolith:
    build:
      context: ../monolith
      dockerfile: Dockerfile
    container_name: hotelio-monolith
    ports:
      - "8084:8080"
    networks:
      - hotelio-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://monolith-db:5432/hotelio
      SPRING_DATASOURCE_USERNAME: hotelio
      SPRING_DATASOURCE_PASSWORD: hotelio
      BOOKING_SERVICE_EXTERNAL_HOST: booking-service
      BOOKING_SERVICE_EXTERNAL_PORT: 9090

  monolith-db:
    image: postgres:15
    container_name: hotelio-db
    environment:
      POSTGRES_USER: hotelio
      POSTGRES_PASSWORD: hotelio
      POSTGRES_DB: hotelio
    ports:
      - "5432:5432"
    volumes:
      - monolith-db-data:/var/lib/postgresql/data
    networks:
      - hotelio-net

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - hotelio-net
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - hotelio-net

  booking-service:
    build:
      context: ./microservices/booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    ports:
      - "9090:9090"
      - "8085:5000"
    depends_on:
      - kafka
      - booking-db
      - booking-history-service
    networks:
      - hotelio-net

  booking-db:
    image: postgres:15
    container_name: booking-db
    environment:
      POSTGRES_USER: hotelio
      POSTGRES_PASSWORD: hotelio
      POSTGRES_DB: booking
    ports:
      - "9999:5432"
    volumes:
      - booking-db-data:/var/lib/postgresql/data
      - ./sql/booking.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hotelio-net

  booking-history-service:
    build:
      context: ./microservices/booking-history-service
      dockerfile: Dockerfile
    container_name: booking-history-service
    depends_on:
      - kafka
      - booking-history-db
    networks:
      - hotelio-net

  booking-history-db:
    image: postgres:15
    container_name: booking-history-db
    environment:
      POSTGRES_USER: hotelio
      POSTGRES_PASSWORD: hotelio
      POSTGRES_DB: booking_history
    ports:
      - "9998:5432"
    volumes:
      - booking-history-db-data:/var/lib/postgresql/data
      - ./sql/booking-history.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hotelio-net

volumes:
  monolith-db-data:
  booking-db-data:
  booking-history-db-data:

networks:
  hotelio-net:
    external: true
