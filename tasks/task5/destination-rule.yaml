apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: booking-service-destination-rule
spec:
  host: booking-service # Имя Kubernetes Service, к которому применяется правило
  trafficPolicy:    
    # Circuit Breaking (аварийный выключатель)
    connectionPool:
      tcp:
        maxConnections: 100  # Максимум соединений
      http:
        http1MaxPendingRequests: 10  # Максимум ожидающих HTTP запросов
        maxRequestsPerConnection: 1 # Максимум запросов на соединение
    # Outlier Detection (обнаружение сбоев)
    outlierDetection:
      consecutive5xxErrors: 3    # Количество ошибок 5xx перед исключением
      interval: 20s              # Интервал проверки
      baseEjectionTime: 30s      # Базовое время изоляции
      maxEjectionPercent: 50     # Максимальный процент изолированных хостов

  subsets:
  - name: v1 # Имя подмножества, на которое ссылается VirtualService
    labels:
      version: v1 
  - name: v2
    labels:
      version: v2