{{- range .Values.deployments }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ .version }}
  labels:
    app: {{ $.Values.appName }}
    version: {{ .version }}
spec:
  replicas: {{ .replicaCount }}
  selector:
    matchLabels:
      app: {{ $.Values.appName }}
      version: {{ .version }}
  template:
    metadata:
      labels:
        app: {{ $.Values.appName }}
        version: {{ .version }}
    spec:
      containers:
        - name: {{ $.Chart.Name }}
          image: "{{ $.Values.image.name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $.Values.service.targetPort }}
          env:
            - name: SERVICE_VERSION
              value: {{ .version | quote }}
            - name: ENABLE_FEATURE_X
              value: {{ ternary "true" "false" .enableFeatureX | quote }}
            {{- range $.Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
{{- end }}
