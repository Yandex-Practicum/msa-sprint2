apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: VERSION
              value: "{{ .Values.app.version }}"
            - name: ENABLE_FEATURE_FLAGS
              value: "{{ .Values.app.featureFlags }}"
          livenessProbe:
            httpGet:
              path: /ping
              port: 8000
          readinessProbe:
            httpGet:
              path: /ping
              port: 8000