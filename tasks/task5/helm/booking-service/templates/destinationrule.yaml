apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ .Release.Name }}
spec:
  host: {{ .Values.istio.host }}
  trafficPolicy:
    loadBalancer:
      simple: LEAST_REQUEST
    connectionPool:
      tcp:
        maxConnections: {{ .Values.istio.circuitBreaker.tcpMaxConnections }}
      http:
        http1MaxPendingRequests: {{ .Values.istio.circuitBreaker.http1MaxPendingRequests }}
        maxRequestsPerConnection: {{ .Values.istio.circuitBreaker.maxRequestsPerConnection }}
        maxRetries: {{ .Values.istio.circuitBreaker.maxRetries }}
    outlierDetection:
      consecutive5xxErrors: {{ .Values.istio.circuitBreaker.consecutive5xxErrors }}
      interval: {{ .Values.istio.circuitBreaker.interval }}
      baseEjectionTime: {{ .Values.istio.circuitBreaker.baseEjectionTime }}
      maxEjectionPercent: {{ .Values.istio.circuitBreaker.maxEjectionPercent }}
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2

