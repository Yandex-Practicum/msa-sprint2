apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: {{ .Release.Name }}-feature-flag
  namespace: {{ .Values.istio.envoyFilter.namespace }}
spec:
  workloadSelector:
    labels:
      istio: ingressgateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inlineCode: |
              function envoy_on_request(handle)
                local feature = handle:headers():get("{{ .Values.istio.featureFlag.requestHeader }}")
                if feature ~= nil and string.lower(feature) == "{{ .Values.istio.featureFlag.enabledValue }}" then
                  handle:headers():replace("{{ .Values.istio.featureFlag.routeHeader }}", "{{ .Values.istio.featureFlag.enabledValue }}")
                end
              end

