apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: booking-service
spec:
  hosts:
    - "*"
  gateways:
    - booking-service-gateway
  http:
    - match:
        - headers:
            X-Feature-Enabled:
              exact: "true"
      route:
        - destination:
            host: booking-service
            subset: v2
          weight: 10
        - destination:
            host: booking-service
            subset: v1
          weight: 90
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,connect-failure,refused-stream
      fault:
        delay:
          percentage:
            value: 0.5
          fixedDelay: 2s
    - match:
        - headers:
            X-Feature-Enabled:
              exact: "false"
      route:
        - destination:
            host: booking-service
            subset: v1

