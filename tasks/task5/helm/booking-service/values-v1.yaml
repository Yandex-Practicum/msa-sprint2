# Конфигурация для версии v1
replicaCount: 2

image:
  name: booking-service
  tag: v1
  pullPolicy: Never  # Для локального Minikube

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# Версия сервиса
serviceVersion: "1.0.0"

# Переменные окружения
environment: production

# Фича-флаги (v1 не поддерживает новые фичи по умолчанию)
featureFlags:
  enableFeatureX: false

# Метки для Istio
labels:
  version: v1
  app: booking-service

# Дополнительные переменные окружения
env:
  - name: SERVICE_VERSION
    value: "1.0.0"

# Ресурсы
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Liveness probe конфигурация
livenessProbe:
  path: /ping
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Readiness probe конфигурация
readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3