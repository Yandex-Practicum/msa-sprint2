replicaCount: 1

image:
  name: booking-service
  tag: latest
  pullPolicy: Never  # Для локального Minikube

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# Переменные окружения
environment: development

# Фича-флаги
featureFlags:
  enableFeatureX: false

# Дополнительные переменные окружения
env: []

# Ресурсы
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Liveness probe конфигурация
livenessProbe:
  path: /ping
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Readiness probe конфигурация
readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

