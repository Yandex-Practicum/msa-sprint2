apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: booking
  namespace: default
spec:
  gateways:
    - booking-gateway
  hosts:
    - "*"
  http:
    - match:
        - headers:
            x-feature-enabled:
              exact: "true"
      route:
        - destination:
            host: booking
            subset: v2
    - route:
        - destination:
            host: booking
            subset: v1
          weight: 50
        - destination:
            host: booking
            subset: v2
          weight: 50
