virtualService:
  name: booking-service-vs
  hosts:
    - booking-service

  # Настройки маршрутизации
  routes:
    - host: booking-service-v1  # Сервис из релиза v1
      weight: 90               # 90% трафика
      port: 80

    - host: booking-service-v2  # Сервис из релиза v2  
      weight: 10               # 10% трафика
      port: 80