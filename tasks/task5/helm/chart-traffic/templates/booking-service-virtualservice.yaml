apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: booking-service
spec:
  hosts:
  - booking-service
  http:
  - route:
    - destination:
        host: booking-service-v1
        port:
          number: 80
      weight: 90
    - destination:
        host: booking-service-v2
        port:
          number: 80       
      weight: 10
 #kubectl port-forward -n istio-system svc/istio-ingressgateway 9090:80