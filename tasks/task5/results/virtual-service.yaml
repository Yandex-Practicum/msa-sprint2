apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: booking-service-v1-dr
spec:
  host: booking-service-v1
  trafficPolicy:
    outlierDetection:
      consecutiveErrors: 5
      interval: 10s
      baseEjectionTime: 30s
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: booking-service-v2-dr
spec:
  host: booking-service-v2
  trafficPolicy:
    outlierDetection:
      consecutiveErrors: 5
      interval: 10s
      baseEjectionTime: 30s
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: booking-service-vs
spec:
  hosts:
    - booking-service-v1
  http:
    - match:
        - headers:
            X-Feature-Enabled:
              exact: "true"
      route:
        - destination:
            host: booking-service-v2
            port:
              number: 80
    - route:
        - destination:
            host: booking-service-v1
            port:
              number: 80
          weight: 90
        - destination:
            host: booking-service-v2
            port:
              number: 80
          weight: 10