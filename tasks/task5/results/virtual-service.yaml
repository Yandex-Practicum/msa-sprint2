# templates/virtual-service.yaml
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: booking-service-vs
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
spec:
  hosts:
  - booking-service
  http:
  - match:
    - headers:
        X-Feature-Enabled:
          exact: "true"
    route:
    - destination:
        host: booking-service
        subset: v2
    retries:
      attempts: 3
      perTryTimeout: 2s
  - route:
    - destination:
        host: booking-service
        subset: v1
      weight: 90
    - destination:
        host: booking-service
        subset: v2
      weight: 10
    retries:
      attempts: 2
      perTryTimeout: 1s