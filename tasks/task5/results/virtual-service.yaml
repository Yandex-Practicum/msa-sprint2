apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: booking-service
  namespace: default
spec:
  hosts:
  - booking-service
  gateways:
  - mesh
  http:
  - name: canary-and-fallback
    route:
    - destination:
        host: booking-service
        subset: v1
      weight: 90
      headers:
        response:
          add:
            x-version: v1
    - destination:
        host: booking-service
        subset: v2
      weight: 10
      headers:
        response:
          add:
            x-version: v2
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: 5xx,connect-failure,refused-stream,reset,gateway-error
