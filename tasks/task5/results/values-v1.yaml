# Профиль «основная версия v1»: больше реплик v1, канареечная v2 минимальна.
# Установка: helm upgrade --install booking-service ./helm/booking-service \
#   -f ./helm/booking-service/values.yaml -f results/values-v1.yaml
appName: booking-service

image:
  name: booking-service
  tag: latest
  pullPolicy: Never

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

deployments:
  - version: v1
    replicaCount: 2
    enableFeatureX: false
  - version: v2
    replicaCount: 1
    enableFeatureX: true

env: []
