apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: feature-flag
  namespace: default
spec:
  workloadSelector:
    labels:
      app: booking-service
  configPatches:
    - applyTo: HTTP_ROUTE
      match:
        context: SIDECAR_INBOUND
      patch:
        operation: MERGE
        value:
          match:
            headers:
              - name: X-Feature-Enabled
                exactMatch: "true"
          route:
            weightedClusters:
              clusters:
                - name: outbound|80|v2|booking-service.default.svc.cluster.local
                  weight: 100