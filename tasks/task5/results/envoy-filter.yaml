apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: booking-feature-flag
  namespace: default
spec:
  workloadSelector:
    labels:
      app: booking-service
  configPatches:
  # Демонстрационный Lua-фильтр: пробрасывает служебный заголовок для отладки
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_OUTBOUND
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
            subFilter:
              name: envoy.filters.http.router
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.lua
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
          inlineCode: |
            function envoy_on_request(handle)
              local ff = handle:headers():get("X-Feature-Enabled")
              if ff == "true" then
                -- для наглядности добавим заголовок
                handle:headers():add("x-feature-route", "v2")
              end
            end
