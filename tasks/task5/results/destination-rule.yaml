apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: booking-service-destination-rule
spec:
  host: booking-service
  trafficPolicy:
    outlierDetection:
      baseEjectionTime: 1m
      consecutiveGatewayErrors: 1
      consecutive5xxErrors: 1
      interval: 3s
      maxEjectionPercent: 100
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
