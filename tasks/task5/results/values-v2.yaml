replicaCount: 1

image:
  name: booking-service-v2
  tag: v2
  pullPolicy: Never

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "64Mi"
    cpu: "250m"
  limits:
    memory: "128Mi"
    cpu: "500m"

env:
  - name: ENABLE_FEATURE_X
    value: "true"

livenessProbe:
  httpGet:
    path: /ping
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
