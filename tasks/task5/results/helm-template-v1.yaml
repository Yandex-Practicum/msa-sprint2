---
# Source: booking-service/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  labels:
    app: booking-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: booking-service
---
# Source: booking-service/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service-v1
  labels:
    app: booking-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
      version: v1
  template:
    metadata:
      labels:
        app: booking-service
        version: v1
    spec:
      containers:
        - name: booking-service
          image: "booking-service:task5"
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ENABLE_FEATURE_X
              value: "false"
            - name: SERVICE_VERSION
              value: v1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            limits:
              cpu: 250m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
