apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: booking-service
  namespace: default
spec:
  hosts:
  - booking-service
  - "*"
  gateways:
  - booking-gateway
  - mesh # Применяется также для внутреннего трафика
  http:
  # Правило 1: Маршрутизация по Feature Flag (приоритет)
  - match:
    - headers:
        X-Feature-Enabled:
          exact: "true"
    route:
    - destination:
        host: booking-service
        subset: v2
      weight: 100
    retries:
      attempts: 3
      perTryTimeout: 5s
  
  # Правило 2: Канареечный деплой (90% v1, 10% v2) с fallback
  - route:
    # Основной трафик на v1
    - destination:
        host: booking-service
        subset: v1
      weight: 90
      # Fallback на v2 при ошибках v1
      fault:
        abort:
          httpStatus: 503
          percentage:
            value: 0.1 # Симулирует редкие сбои для тестирования
    # Канареечный трафик на v2
    - destination:
        host: booking-service
        subset: v2
      weight: 10
    # Политика повторов для всех запросов
    retries:
      attempts: 2
      perTryTimeout: 3s
      retryOn: 5xx,reset,connect-failure,refused-stream
    # Таймауты
    timeout: 10s
    
    # Fallback правило при полном отказе v1
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s