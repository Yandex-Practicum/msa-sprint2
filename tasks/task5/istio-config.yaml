apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: httpbin-gateway
  namespace: default
spec:
  selector:
    istio: ingressgateway # Используем стандартный gateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*" # Разрешаем все хосты
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: httpbin
  namespace: default
spec:
  hosts:
  - "*" # Обрабатываем запросы для любых хостов
  gateways:
  - httpbin-gateway # Привязываем к нашему gateway
  http:
  - match:
    - uri:
        prefix: / # Обрабатываем все URL пути
    route:
    - destination:
        host: booking-service # Полное имя сервиса
        port:
          number: 80