stages:
  - build
  - test
  - deploy
  - destroy
  - tag

build:
  stage: build
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG ./booking-service


test:
  stage: test
  script:
    - docker run -d --name test -p 8080:8080 $IMAGE_NAME:$IMAGE_TAG
    - sleep 5
    - curl -f http://localhost:8080/ping
    - docker rm -f test


deploy:
  stage: deploy
  script:
    - minikube image load $IMAGE_NAME:$IMAGE_TAG
    - helm upgrade --install booking helm/booking --wait

destroy:
  stage: destroy
  script:
    - helm uninstall booking-v1
    - helm uninstall booking-v2

tag:
  stage: tag
  script:
    - TIMESTAMP=$(date +%Y%m%d%H)
    - git tag v$TIMESTAMP
