stages:
  - build
  - test
  - deploy
  - verify
  - tag

variables:
  IMAGE_NAME: booking-service
  IMAGE_TAG: latest
  DOCKER_IMAGE: ${IMAGE_NAME}:${IMAGE_TAG}

build:
  stage: build
  script:
    - docker build -t ${DOCKER_IMAGE} ./booking-service
    - docker save ${DOCKER_IMAGE} -o ${IMAGE_NAME}.tar
  artifacts:
    paths:
      - ${IMAGE_NAME}.tar
    expire_in: 1h

unit-test:
  stage: test
  image: golang:1.21-alpine
  script:
    - cd booking-service
    - go test ./... -v -cover

integration-test:
  stage: test
  script:
    - docker load -i ${IMAGE_NAME}.tar
    - docker run -d --name test-container -p 8080:8080 ${DOCKER_IMAGE}
    - sleep 5
    - curl -f http://localhost:8080/ping
    - curl -f http://localhost:8080/health
    - docker stop test-container && docker rm test-container
  needs:
    - build

deploy:
  stage: deploy
  script:
    - minikube image load ${DOCKER_IMAGE}
    - |
      helm upgrade --install ${IMAGE_NAME} ./helm/booking-service \
        --set image.name=${IMAGE_NAME} \
        --set image.tag=${IMAGE_TAG} \
        --set image.pullPolicy=Never \
        --wait --timeout 5m
    - kubectl wait --for=condition=ready pod -l app=${IMAGE_NAME} --timeout=120s
    - ./check-status.sh
  needs:
    - unit-test
    - integration-test

verify:
  stage: verify
  script:
    - ./check-dns.sh
  needs:
    - deploy

tag:
  stage: tag
  script:
    - 'TIMESTAMP=$(date +%Y%m%d-%H%M%S)'
    - 'git tag -a "release-${TIMESTAMP}" -m "Release ${TIMESTAMP}"'
    - 'echo "Created tag: release-${TIMESTAMP}"'
  when: manual