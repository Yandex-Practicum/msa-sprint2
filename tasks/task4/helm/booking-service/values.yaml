replicaCount: 1

image:
  name: booking-service
  tag: latest
  pullPolicy: Never

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  - name: ENABLE_FEATURE_X
    value: "true"
  - name: DB_HOST
    value: "booking-service-postgresql"
  - name: DB_USER
    value: "booking"
  - name: DB_PASSWORD
    value: "booking"
  - name: DB_NAME
    value: "booking_db"
  - name: DB_PORT
    value: "5432"

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

postgresql:
  enabled: true
  auth:
    postgresPassword: booking
    username: booking
    password: booking
    database: booking_db
  primary:
    persistence:
      enabled: false