replicaCount: 1

image:
  name: booking-service
  tag: latest
  pullPolicy: IfNotPresent

# Feature flag: maps to env ENABLE_FEATURE_X=true|false
enableFeatureX: false

env: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
