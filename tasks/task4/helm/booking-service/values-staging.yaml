replicaCount: 1

image:
  name: booking-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:

env:
  ENABLE_FEATURE_X: "true"

livenessProbe:
  livenessProbe:
    httpGet:
      path: /ping
      port: 8080
    initialDelaySeconds: 2
    periodSeconds: 5

readinessProbe:
  livenessProbe:
    httpGet:
      path: /ping
      port: 8080
    initialDelaySeconds: 2
    periodSeconds: 5

