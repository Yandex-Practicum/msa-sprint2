apiVersion: v1
kind: Service
metadata:
  name: booking-service
  labels: {{- include "booking-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "booking-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}