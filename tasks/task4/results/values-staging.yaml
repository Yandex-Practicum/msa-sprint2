replicaCount: 1

image:
  name: booking-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  ENABLE_FEATURE_X: true

resources:
  requests:
    memory: 1G
    cpu: 400m
  limits:
    memory: 1G
    cpu: 400m

livenessProbe:
  httpGet:
    path: /ping
  failureThreshold: 5
  periodSeconds: 10
  initialDelaySeconds: 30


readinessProbe:
  httpGet:
    path: /ping
  initialDelaySeconds: 10
  failureThreshold: 5
  periodSeconds: 10

