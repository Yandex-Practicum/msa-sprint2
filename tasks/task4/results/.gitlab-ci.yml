stages:
  - unit_test
  - build
  - test
  - deploy
  - tag

variables:
  IMAGE_TAG: latest
  IMAGE_NAME: booking-service
  TEST_NAME: booking-service-ci-test
  TEST_PORT: "18080"
  HELM_RELEASE: booking-service
  HELM_CHART: helm/booking-service
  VALUES_FILE: helm/booking-service/values-staging.yaml

unit_test:
  stage: unit_test
  script:
    - docker run --rm -v "$PWD/booking-service:/src" -w /src golang:1.21-alpine go test ./...

build:
  stage: build
  script:
    - docker build -t "$IMAGE_NAME:$IMAGE_TAG" booking-service

test:
  stage: test
  script:
    - docker rm -f "$TEST_NAME" || true
    - docker run -d --name "$TEST_NAME" -p "$TEST_PORT:8080" "$IMAGE_NAME:$IMAGE_TAG"
    - |
      for i in $(seq 1 30); do
        if docker exec "$TEST_NAME" wget -qO- http://localhost:8080/ping | grep -q '^pong$'; then
          break
        fi
        sleep 1
      done
    - test "$(docker exec "$TEST_NAME" wget -qO- http://localhost:8080/ping)" = "pong"
    - test "$(docker exec "$TEST_NAME" wget -qO- http://localhost:8080/ready)" = "ready"
    - docker rm -f "$TEST_NAME"
  after_script:
    - docker rm -f "$TEST_NAME" || true

deploy:
  stage: deploy
  script:
    - minikube image load "$IMAGE_NAME:$IMAGE_TAG"
    - helm upgrade --install "$HELM_RELEASE" "$HELM_CHART" -f "$VALUES_FILE" --set image.name="$IMAGE_NAME" --set image.tag="$IMAGE_TAG"
    - kubectl rollout status "deployment/$HELM_RELEASE"

tag:
  stage: tag
  script:
    - export RELEASE_TAG="task4-$(date +%Y%m%d%H%M%S)"
    - git tag "$RELEASE_TAG"
    - echo "Created tag $RELEASE_TAG"
