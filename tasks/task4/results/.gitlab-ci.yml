stages:
  - build
  - test
  - deploy
  - tag

variables:
  IMAGE_TAG: latest
  IMAGE_NAME: booking-service

build:
  stage: build
  script:
    - cd ./booking-service
    - docker build -t $IMAGE_NAME .

test:
  stage: test
  script:
    - docker run -p 8080:8080 --name $IMAGE_NAME -d -i -t $IMAGE_NAME:$IMAGE_TAG
    - curl --fail http://localhost:8080/ping && echo "✅ Reachable" || echo "❌ Not responding"
    - docker stop $IMAGE_NAME && docker rm $IMAGE_NAME

deploy:
  stage: deploy
  script:
    - minikube image load $IMAGE_NAME:$IMAGE_TAG
    - helm upgrade -i $IMAGE_NAME-release ./helm/booking-service

tag:
  stage: tag
  script:
    - export GIT_TAG=$(echo $CI_JOB_STARTED_AT | sed 's/:/-/g')
    - git tag -a $GIT_TAG -m "This tag is created automatically by the CI/CD pipeline."
    - git push origin $GIT_TAG
 