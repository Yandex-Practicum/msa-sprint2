stages:
  - build
  - test
  - deploy
  - tag

variables:
  IMAGE_TAG: latest
  IMAGE_NAME: booking-service

build:
  stage: build
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG ./booking-service
    - echo "Image built successfully"

test:
  stage: test
  script:
    - docker run -d --name test-container $IMAGE_NAME:$IMAGE_TAG
    - sleep 10
    - curl -f http://localhost:8080/ping || exit 1
    - docker rm -f test-container
    - echo "Tests passed successfully"

deploy:
  stage: deploy
  script:
    - minikube image load $IMAGE_NAME:$IMAGE_TAG
    - helm upgrade --install booking-service ./helm/booking-service --values ./helm/booking-service/values.yaml
    - echo "Deployment completed successfully"

tag:
  stage: tag
  script:
    - git tag -a "v$(date +%Y%m%d-%H%M%S)" -m "Auto-tag from CI/CD pipeline"
    - echo "Git tag created successfully"
 