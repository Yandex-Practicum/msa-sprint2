stages:
  - build
  - test
  - deploy
  - tag

variables:
  IMAGE_TAG: latest
  IMAGE_NAME: booking-service
  CONTAINER_NAME: booking-service-test

# Сборка Docker образа
build:
  stage: build
  script:
    - echo "Building Docker image..."
    - cd booking-service
    - docker build -t ${IMAGE_NAME}:${IMAGE_TAG} .
    - docker build -t ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA} .
    - echo "Docker image built successfully"
    - docker images | grep ${IMAGE_NAME}
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - build.env
  after_script:
    - echo "IMAGE_TAG=${CI_COMMIT_SHORT_SHA}" > build.env

# Тестирование сервиса
test:
  stage: test
  dependencies:
    - build
  script:
    - echo "Starting container for testing..."
    - docker run -d --name ${CONTAINER_NAME} -p 8080:8080 ${IMAGE_NAME}:${IMAGE_TAG}
    - echo "Waiting for service to be ready..."
    - sleep 5
    
    # Проверка health endpoint
    - echo "Testing /ping endpoint..."
    - curl -f http://localhost:8080/ping || exit 1
    - echo "Health check passed"
    
    # Проверка readiness endpoint
    - echo "Testing /ready endpoint..."
    - curl -f http://localhost:8080/ready || exit 1
    - echo "Readiness check passed"
    
    # Проверка status endpoint
    - echo "Testing /status endpoint..."
    - curl -f http://localhost:8080/status || exit 1
    
    # Проверка bookings endpoint
    - echo "Testing /bookings endpoint..."
    - curl -f http://localhost:8080/bookings || exit 1
    
    # Тест с feature flag
    - echo "Testing with feature flag enabled..."
    - docker stop ${CONTAINER_NAME}
    - docker rm ${CONTAINER_NAME}
    - docker run -d --name ${CONTAINER_NAME} -e ENABLE_FEATURE_X=true -p 8080:8080 ${IMAGE_NAME}:${IMAGE_TAG}
    - sleep 5
    - curl -f http://localhost:8080/feature || exit 1
    - echo "Feature flag test passed"
    
  after_script:
    - docker stop ${CONTAINER_NAME} || true
    - docker rm ${CONTAINER_NAME} || true
    - echo "Test container cleaned up"

# Развёртывание в Minikube
deploy:
  stage: deploy
  dependencies:
    - build
    - test
  script:
    - echo "Loading image to Minikube..."
    - minikube image load ${IMAGE_NAME}:${IMAGE_TAG}
    - minikube image load ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
    
    - echo "Deploying with Helm..."
    - cd helm/booking-service
    
    # Установка или обновление релиза
    - |
      if helm list | grep -q booking-service; then
        echo "Updating existing release..."
        helm upgrade booking-service . \
          --set image.tag=${CI_COMMIT_SHORT_SHA} \
          --set environment=${ENVIRONMENT:-development}
      else
        echo "Installing new release..."
        helm install booking-service . \
          --set image.tag=${CI_COMMIT_SHORT_SHA} \
          --set environment=${ENVIRONMENT:-development}
      fi
    
    - echo "Waiting for deployment to be ready..."
    - kubectl wait --for=condition=ready pod -l app=booking-service --timeout=60s
    
    - echo "Deployment successful!"
    - kubectl get pods -l app=booking-service
    - kubectl get svc booking-service

# Создание git тега с timestamp
tag:
  stage: tag
  dependencies:
    - deploy
  script:
    - echo "Creating git tag..."
    - TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    - TAG_NAME="release-${TIMESTAMP}"
    - echo "Tag name: ${TAG_NAME}"
    
    # В реальном CI/CD это бы создавало тег в git
    # git tag ${TAG_NAME}
    # git push origin ${TAG_NAME}
    
    - echo "Git tag ${TAG_NAME} would be created (skipped in local mode)"
    - echo "Build version: ${CI_COMMIT_SHORT_SHA}"
    - echo "Timestamp: ${TIMESTAMP}"
  only:
    - main
    - master
 