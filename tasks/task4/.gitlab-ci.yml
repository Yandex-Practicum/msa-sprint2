stages:
  - build
  - test
  - deploy
  - tag

variables:
  IMAGE_TAG: latest
  IMAGE_NAME: booking-service

build:
  stage: build
  script:
    - mvn -f booking-service/pom.xml clean install
    - mvn -f booking-service/pom.xml jar:jar
    - docker build -t $IMAGE_NAME:$IMAGE_TAG booking-service/


test:
  stage: test
  script:
    - docker rm -f test
    - docker run --name test -p 8080:8080 -d $IMAGE_NAME:$IMAGE_TAG
    - bash ./check-status.sh
    - docker rm -f test

deploy:
  stage: deploy
  script:
    - minikube image load $IMAGE_NAME
    - helm upgrade --install booking-service ./helm/booking-service

tag:
  stage: tag
  script:
    - git tag v1.0
  allow_failure: true
