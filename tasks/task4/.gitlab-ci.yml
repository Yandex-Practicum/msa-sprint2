stages:
  - build
  - test
  - deploy
  - tag

variables:
  IMAGE_TAG: latest
  IMAGE_NAME: booking-service

build:
  stage: build
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG -f booking-service/Dockerfile .

test:
  stage: test
  script:
    - docker run -d --name ${IMAGE_NAME}-test -p 8081:8080 $IMAGE_NAME:$IMAGE_TAG
    - sleep 2
    - curl -f http://localhost:8081/ping
    - docker rm -f ${IMAGE_NAME}-test

deploy:
  stage: deploy
  script:
    - minikube image load $IMAGE_NAME:$IMAGE_TAG
    - helm upgrade --install $IMAGE_NAME ./helm/booking-service -f values-staging.yaml

tag:
  stage: tag
  script:
    - git tag ${IMAGE_NAME}-$(date +%Y%m%d%H%M%S)
    - git push origin --tags
  when: manual
