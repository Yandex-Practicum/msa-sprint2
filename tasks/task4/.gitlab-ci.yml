stages:
  - build
  - test
  - deploy
  - tag

variables:
  IMAGE_TAG: latest
  IMAGE_NAME: booking-service

build:
  stage: build
  script:
    - cd booking-service
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .


test:
  stage: test
  script:
    - docker run -d --name test_container_hw2_tsk4_sec3 -p 8080:8080 $IMAGE_NAME:$IMAGE_TAG
    - curl --fail http://localhost:8080/ping && echo "✅ Reachable" || echo "❌ Not responding"
    - docker stop test_container_hw2_tsk4_sec3
    - docker rm test_container_hw2_tsk4_sec3


deploy:
  stage: deploy
  script:
    - minikube image load $IMAGE_NAME:$IMAGE_TAG
    - helm upgrade --install booking-service helm/booking-service -f helm/booking-service/environment/values-staging.yaml

tag:
  stage: tag
  script:
    - TAG_NAME="$(date +%s)"
    - git tag "$TAG_NAME"